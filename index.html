<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Say.AI</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
<h1>🤖 Say.AI</h1>
<p>Create Images, Videos & Chat with AI</p>
</header>
<section class="hero">
  <h2>Welcome to Say.AI</h2>
  <p>Create AI Images, AI Videos and Chat with AI</p>

  <input type="text" placeholder="Describe your image or video..." id="prompt">

  <br><br>

  <button onclick="image()">Generate Image</button>
<button onclick="video()">Generate Video</button>

  <br><br>

  <input type="file" multiple accept="image/*">

</section>

<div class="container">

<button onclick="chat()">💬 AI Chat</button>

<button onclick="image()">🖼 AI Image</button>

<button onclick="video()">🎥 AI Video</button>

<button onclick="photo()">📷 Photo Editor</button>

<button onclick="editvideo()">🎬 Video Editor</button>

</div>

<script src="script.js"></script>

</body>
</html>
